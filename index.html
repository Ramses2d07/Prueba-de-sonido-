<!DOCTYPE html>
<html>
<head>
  <title>Sound Tool - Game UI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;

      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* 🧭 BAR */
    .navbar {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #111;
      align-items: center;
    }

    textarea {
      flex: 1;
      height: 80px;
      background: #1e1e1e;
      color: white;
      border: 2px solid #f1c40f;
      border-radius: 8px;
      padding: 10px;
      font-family: monospace;
    }

    button {
      padding: 10px 15px;
      font-weight: bold;

      background: linear-gradient(145deg, #2ecc71, #1e8f4f);
      color: white;

      border: 2px solid #f1c40f;
      border-radius: 8px;

      cursor: pointer;
    }

    .info {
      padding: 10px;
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <!-- 🧭 TOOL BAR -->
  <div class="navbar">

    <textarea id="code">
// Escribe:
play("click");
    </textarea>

    <button onclick="runCode()">▶ Play</button>

  </div>

  <div class="info">
    Tip: click / soft / pop
  </div>

  <script>
    let audioCtx;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    // 🎮 SONIDO TIPO JUEGO MODERNO (NO ELECTRÓNICO)
    function play(type) {
      initAudio();

      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();

      o.connect(g);
      g.connect(audioCtx.destination);

      let freq = 180;
      let shape = "triangle";

      if (type === "click") {
        freq = 180;   // thock
        shape = "triangle";
      }

      if (type === "soft") {
        freq = 120;   // suave
        shape = "sine";
      }

      if (type === "pop") {
        freq = 260;   // pop UI
        shape = "triangle";
      }

      o.type = shape;
      o.frequency.value = freq;

      g.gain.value = 0.06;

      o.start();
      o.stop(audioCtx.currentTime + 0.08);
    }

    function runCode() {
      const code = document.getElementById("code").value;

      try {
        eval(code);
      } catch (e) {
        alert("Error en código");
      }
    }
  </script>

</body>
</html>
