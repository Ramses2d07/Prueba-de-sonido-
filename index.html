<!DOCTYPE html>
<html>
<head>
  <title>Sound Tool - Real Game UI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;

      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .navbar {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #111;
      align-items: center;
    }

    textarea {
      flex: 1;
      height: 80px;
      background: #1e1e1e;
      color: white;
      border: 2px solid #f1c40f;
      border-radius: 8px;
      padding: 10px;
      font-family: monospace;
    }

    button {
      padding: 10px 15px;
      font-weight: bold;

      background: linear-gradient(145deg, #2ecc71, #1e8f4f);
      color: white;

      border: 2px solid #f1c40f;
      border-radius: 8px;

      cursor: pointer;
    }

    .info {
      padding: 10px;
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <!-- 🧭 TOOL BAR -->
  <div class="navbar">

    <textarea id="code">
// Sonidos disponibles:
play("click");
play("soft");
play("heavy");
    </textarea>

    <button onclick="runCode()">▶ Play</button>

  </div>

  <div class="info">
    🎮 click = fuerte | soft = suave | heavy = grave
  </div>

  <script>
    let audioCtx;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    // 🎮 SONIDO REALISTA (NO ELECTRÓNICO)
    function play(type) {
      initAudio();

      const bufferSize = audioCtx.sampleRate * 0.06;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);

      // 🔊 ruido tipo “golpe físico”
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
      }

      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;

      const filter = audioCtx.createBiquadFilter();
      filter.type = "lowpass";

      let cutoff = 800;

      if (type === "click") {
        cutoff = 900;
      }

      if (type === "soft") {
        cutoff = 500;
      }

      if (type === "heavy") {
        cutoff = 250;
      }

      filter.frequency.value = cutoff;

      const gain = audioCtx.createGain();
      gain.gain.value = 0.09;

      noise.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);

      noise.start();
    }

    function runCode() {
      const code = document.getElementById("code").value;

      try {
        eval(code);
      } catch (e) {
        alert("Error en código");
      }
    }
  </script>

</body>
</html>
